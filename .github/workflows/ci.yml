name: Python Continuous Integration

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff bandit pytest
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Lint and format check with Ruff
      run: |
        ruff check --format=github --select=E9,F63,F7,F82 --target-version=py310 .
        ruff check --format=github --target-version=py310 .

    - name: Security scan with Bandit
      run: |
        bandit -r src/ -ll

    - name: Run tests with pytest
      env:
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        QDRANT_URL: ${{ secrets.QDRANT_URL }}
        QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
        TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
      run: |
        if [ -d "tests" ]; then pytest; else echo "No tests folder found. Skipping."; fi
